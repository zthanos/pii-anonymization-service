version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: pii-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - pii-network
    restart: unless-stopped

  # PII Service Instance 1
  pii-service-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pii-service-1
    expose:
      - "8000"   # REST API (internal)
      - "50051"  # gRPC (internal)
    volumes:
      - ./policies:/app/policies:ro
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      REDIS_POOL_SIZE: 200
      POLICY_PATH: /app/policies/example_policy.yaml
      CUSTOMER_DB_KEY: ${CUSTOMER_DB_KEY:-}
      ANALYTICS_DB_KEY: ${ANALYTICS_DB_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      API_KEY: ${API_KEY:-dev_api_key_12345}
      SSL_KEYFILE: ${SSL_KEYFILE:-}
      SSL_CERTFILE: ${SSL_CERTFILE:-}
      SSL_CA_CERTS: ${SSL_CA_CERTS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pii-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # PII Service Instance 2
  pii-service-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pii-service-2
    expose:
      - "8000"
      - "50051"
    volumes:
      - ./policies:/app/policies:ro
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      REDIS_POOL_SIZE: 200
      POLICY_PATH: /app/policies/example_policy.yaml
      CUSTOMER_DB_KEY: ${CUSTOMER_DB_KEY:-}
      ANALYTICS_DB_KEY: ${ANALYTICS_DB_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      API_KEY: ${API_KEY:-dev_api_key_12345}
      SSL_KEYFILE: ${SSL_KEYFILE:-}
      SSL_CERTFILE: ${SSL_CERTFILE:-}
      SSL_CA_CERTS: ${SSL_CA_CERTS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pii-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # PII Service Instance 3
  pii-service-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pii-service-3
    expose:
      - "8000"
      - "50051"
    volumes:
      - ./policies:/app/policies:ro
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      REDIS_POOL_SIZE: 200
      POLICY_PATH: /app/policies/example_policy.yaml
      CUSTOMER_DB_KEY: ${CUSTOMER_DB_KEY:-}
      ANALYTICS_DB_KEY: ${ANALYTICS_DB_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      API_KEY: ${API_KEY:-dev_api_key_12345}
      SSL_KEYFILE: ${SSL_KEYFILE:-}
      SSL_CERTFILE: ${SSL_CERTFILE:-}
      SSL_CA_CERTS: ${SSL_CA_CERTS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pii-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # PII Service Instance 4
  pii-service-4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pii-service-4
    expose:
      - "8000"
      - "50051"
    volumes:
      - ./policies:/app/policies:ro
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      REDIS_POOL_SIZE: 200
      POLICY_PATH: /app/policies/example_policy.yaml
      CUSTOMER_DB_KEY: ${CUSTOMER_DB_KEY:-}
      ANALYTICS_DB_KEY: ${ANALYTICS_DB_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      API_KEY: ${API_KEY:-dev_api_key_12345}
      SSL_KEYFILE: ${SSL_KEYFILE:-}
      SSL_CERTFILE: ${SSL_CERTFILE:-}
      SSL_CA_CERTS: ${SSL_CA_CERTS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pii-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Nginx Load Balancer for HTTP
  nginx:
    image: nginx:alpine
    container_name: pii-nginx
    ports:
      - "8000:8000"   # HTTP load balancer
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - pii-service-1
      - pii-service-2
      - pii-service-3
      - pii-service-4
    networks:
      - pii-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Envoy Load Balancer for gRPC
  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: pii-envoy
    ports:
      - "50051:50051"  # gRPC load balancer
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - pii-service-1
      - pii-service-2
      - pii-service-3
      - pii-service-4
    networks:
      - pii-network
    restart: unless-stopped
    command: ["-c", "/etc/envoy/envoy.yaml"]

volumes:
  redis-data:
    driver: local

networks:
  pii-network:
    driver: bridge
