admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
  - name: grpc_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 50051
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: grpc
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: pii_service
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                  grpc: {}
                route:
                  cluster: pii_service_cluster
                  timeout: 60s
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          # HTTP/2 settings for gRPC
          http2_protocol_options:
            max_concurrent_streams: 1000
            initial_stream_window_size: 1048576  # 1MB
            initial_connection_window_size: 1048576  # 1MB

  clusters:
  - name: pii_service_cluster
    type: STRICT_DNS
    lb_policy: LEAST_REQUEST  # Use least request load balancing
    http2_protocol_options: {}  # Enable HTTP/2 for gRPC
    load_assignment:
      cluster_name: pii_service_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: pii-service-1
                port_value: 50051
            health_check_config:
              port_value: 8000
        - endpoint:
            address:
              socket_address:
                address: pii-service-2
                port_value: 50051
            health_check_config:
              port_value: 8000
        - endpoint:
            address:
              socket_address:
                address: pii-service-3
                port_value: 50051
            health_check_config:
              port_value: 8000
        - endpoint:
            address:
              socket_address:
                address: pii-service-4
                port_value: 50051
            health_check_config:
              port_value: 8000
    # Health checking
    health_checks:
    - timeout: 3s
      interval: 10s
      unhealthy_threshold: 3
      healthy_threshold: 2
      http_health_check:
        path: /health
        expected_statuses:
        - start: 200
          end: 299
    # Connection pool settings
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 10000
        max_pending_requests: 10000
        max_requests: 10000
        max_retries: 3
    # Outlier detection (circuit breaking)
    outlier_detection:
      consecutive_5xx: 5
      interval: 30s
      base_ejection_time: 30s
      max_ejection_percent: 50
      enforcing_consecutive_5xx: 100
