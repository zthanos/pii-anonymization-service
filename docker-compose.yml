version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: pii-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - pii-network
    restart: unless-stopped

  pii-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pii-service
    ports:
      - "8000:8000"   # REST API
      - "50051:50051" # gRPC
    volumes:
      - ./policies:/app/policies:ro
    environment:
      # Redis configuration
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      REDIS_POOL_SIZE: 50
      
      # Policy configuration
      POLICY_PATH: /app/policies/example_policy.yaml
      
      # Encryption keys (generate with scripts/generate_key.py)
      CUSTOMER_DB_KEY: ${CUSTOMER_DB_KEY:-}
      ANALYTICS_DB_KEY: ${ANALYTICS_DB_KEY:-}
      
      # LLM API configuration
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # API authentication (optional for local dev)
      API_KEY: ${API_KEY:-dev_api_key_12345}
      
      # TLS configuration (optional)
      SSL_KEYFILE: ${SSL_KEYFILE:-}
      SSL_CERTFILE: ${SSL_CERTFILE:-}
      SSL_CA_CERTS: ${SSL_CA_CERTS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pii-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  redis-data:
    driver: local

networks:
  pii-network:
    driver: bridge
