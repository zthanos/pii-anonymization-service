events {
    worker_connections 4096;
}

http {
    # Upstream pool for PII service instances
    upstream pii_service {
        least_conn;  # Use least connections load balancing
        
        server pii-service-1:8000 max_fails=3 fail_timeout=30s;
        server pii-service-2:8000 max_fails=3 fail_timeout=30s;
        server pii-service-3:8000 max_fails=3 fail_timeout=30s;
        server pii-service-4:8000 max_fails=3 fail_timeout=30s;
        
        keepalive 32;  # Keep connections alive
    }

    # Server configuration
    server {
        listen 8000;
        
        # Increase timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Increase buffer sizes
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Health check endpoint
        location /health {
            proxy_pass http://pii_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # All other endpoints
        location / {
            proxy_pass http://pii_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Enable keepalive
            proxy_set_header Connection "keep-alive";
        }
    }
    
    # Access log
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
