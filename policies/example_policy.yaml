# Example PII Anonymization Service Policy Configuration
# This file defines PII fields, encryption keys, and tokenization rules per system

systems:
  # Customer database system configuration
  - system_id: "customer_db"
    # Encryption key reference - can be env:VAR_NAME or file:/path/to/key
    # Generate a key using: python scripts/generate_key.py
    encryption_key_ref: "env:CUSTOMER_DB_KEY"
    
    # Structured data configuration
    structured:
      # List of PII fields to tokenize
      pii_fields:
        # Simple field - email address
        - name: "email"
          deterministic: true  # Same email always gets same token
          token_format: "uuid"
          nullable: false
        
        # Nested field using dot-notation
        - name: "address.street"
          deterministic: false  # Different token each time
          token_format: "prefixed"
          token_prefix: "ADDR_"
          nullable: true
        
        # SSN with deterministic tokenization
        - name: "ssn"
          deterministic: true
          token_format: "deterministic"  # HMAC-SHA256
          nullable: false
        
        # Phone number
        - name: "phone"
          deterministic: false
          token_format: "uuid"
          nullable: true
      
      # Token time-to-live in seconds (0 = never expire)
      token_ttl_seconds: 86400  # 24 hours
    
    # Unstructured data configuration
    unstructured:
      # Detector strategy for free-form text
      detector: "hybrid"

      prefilter:
        enabled: true
        min_length: 8

      semantic_detector:
        provider: "huggingface"
        model: "amichailidis/bert-base-greek-uncased-v1-finetuned-ner"
        threshold: 0.85
        enabled_for:
          - "PERSON"
          - "ORG"
          - "LOCATION"

      entities:
        - type: "EMAIL"
          detection: ["deterministic"]
          action: "tokenize"

        - type: "PHONE_GR"
          detection: ["deterministic"]
          action: "tokenize"

        - type: "AFM_GR"
          detection: ["deterministic"]
          action: "tokenize"

        - type: "AMKA_GR"
          detection: ["deterministic"]
          action: "tokenize"

        - type: "PERSON"
          detection: ["semantic"]
          action: "redact"
          min_confidence: 0.90

        - type: "ORG"
          detection: ["semantic"]
          action: "redact"

        - type: "LOCATION"
          detection: ["semantic"]
          action: "redact"

      overlap_resolution:
        strategy: "longest_match"

      # Maximum text length (characters)
      max_text_length: 50000
  
  # Analytics database system configuration
  - system_id: "analytics_db"
    encryption_key_ref: "env:ANALYTICS_DB_KEY"
    
    structured:
      pii_fields:
        - name: "user_id"
          deterministic: true
          token_format: "deterministic"
          nullable: false
        
        - name: "email"
          deterministic: true
          token_format: "uuid"
          nullable: false
      
      # Never expire tokens for analytics
      token_ttl_seconds: 0
  
  # HR system configuration - realistic production scenario
  - system_id: "hr_system"
    encryption_key_ref: "env:HR_SYSTEM_KEY"
    
    structured:
      pii_fields:
        # Employee identification
        - name: "employee_id"
          deterministic: true
          token_format: "prefixed"
          token_prefix: "EMP_"
          nullable: false
        
        - name: "ssn"
          deterministic: true
          token_format: "deterministic"
          nullable: false
        
        - name: "email"
          deterministic: true
          token_format: "uuid"
          nullable: false
        
        - name: "phone"
          deterministic: false
          token_format: "uuid"
          nullable: true
        
        # Personal information
        - name: "first_name"
          deterministic: false
          token_format: "prefixed"
          token_prefix: "NAME_"
          nullable: false
        
        - name: "last_name"
          deterministic: false
          token_format: "prefixed"
          token_prefix: "NAME_"
          nullable: false
        
        - name: "date_of_birth"
          deterministic: true
          token_format: "deterministic"
          nullable: false
        
        # Payroll information (can expose identity)
        - name: "salary"
          deterministic: false
          token_format: "uuid"
          nullable: false
        
        - name: "bank_account"
          deterministic: true
          token_format: "deterministic"
          nullable: false
        
        # Position information (can expose identity for unique roles)
        - name: "position"
          deterministic: false
          token_format: "prefixed"
          token_prefix: "POS_"
          nullable: false
        
        - name: "department"
          deterministic: false
          token_format: "prefixed"
          token_prefix: "DEPT_"
          nullable: false
        
        # Benefits information
        - name: "emergency_contact"
          deterministic: false
          token_format: "uuid"
          nullable: true
      
      # Keep HR tokens for 1 year
      token_ttl_seconds: 31536000

# Default system to use when client doesn't specify X-System-ID header
default_system: "customer_db"
